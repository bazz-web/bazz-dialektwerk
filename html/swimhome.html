<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SwimHome - Minimalist Stage</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        /* --- MINIMALIST VARIABLES --- */
        :root {
            --bg-void: #030305;
            --glass-bg: rgba(255, 255, 255, 0.02);
            --glass-border: rgba(255, 255, 255, 0.04);
            --glass-hover: rgba(255, 255, 255, 0.06);
            --accent-pink: #FF007F;
            --accent-purple: #7928CA;
            --text-main: #FFFFFF;
            --text-muted: rgba(255, 255, 255, 0.4);
            --font-main: 'Outfit', sans-serif;
            --radius-xl: 32px;
            --radius-lg: 24px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            background-color: var(--bg-void);
            color: var(--text-main);
            font-family: var(--font-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            overflow-x: hidden;
        }

        /* --- SUBTLE AMBIENT BACKGROUND --- */
        .ambient-mesh {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                radial-gradient(circle at 20% 30%, rgba(121, 40, 202, 0.08), transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(255, 0, 127, 0.05), transparent 50%);
            z-index: 0;
            pointer-events: none;
        }

        /* --- MAIN LAYOUT GRID --- */
        .core-layout {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 1500px;
            height: 85vh;
            min-height: 700px;
            display: grid;
            grid-template-columns: 420px 1fr;
            /* Fixe Breite für Player, Rest fürs Spiel */
            gap: 30px;
            align-items: stretch;
        }

        /* Basis Bento-Style für Leichtigkeit */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-xl);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        /* =========================================
           LEFT: MUSIC DISCOVERY
           ========================================= */
        .discovery-stack {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* 1. Artist Header (Super Clean) */
        .artist-header {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 10px;
        }

        .avatar {
            width: 80px;
            height: 80px;
            border-radius: var(--radius-lg);
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-pink));
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 20px rgba(121, 40, 202, 0.2);
            flex-shrink: 0;
        }

        .avatar svg {
            width: 35px;
            height: 35px;
            fill: none;
            stroke: white;
            stroke-width: 1.5;
        }

        .artist-info {
            display: flex;
            flex-direction: column;
        }

        .artist-name {
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: -1px;
            line-height: 1;
        }

        .track-name {
            font-size: 1.1rem;
            color: var(--text-muted);
            margin-top: 4px;
            font-weight: 400;
        }

        /* 2. Video Player */
        .video-card {
            flex-grow: 1;
            /* Nimmt den restlichen Platz ein */
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at center, rgba(121, 40, 202, 0.1), transparent);
            overflow: hidden;
        }

        .play-btn-large {
            width: 70px;
            height: 70px;
            background: var(--accent-pink);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(255, 0, 127, 0.4);
            transition: transform 0.3s ease;
        }

        .play-btn-large:hover {
            transform: scale(1.1);
        }

        .play-btn-large svg {
            width: 30px;
            height: 30px;
            fill: white;
            stroke: none;
            margin-left: 5px;
        }

        /* 3. Minimalist Controls */
        .controls-card {
            display: flex;
            justify-content: space-between;
            padding: 15px 25px;
            border-radius: var(--radius-lg);
        }

        .icon-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.2s, transform 0.2s;
            padding: 10px;
        }

        .icon-btn:hover {
            color: white;
            transform: translateY(-2px);
        }

        .icon-btn svg {
            width: 28px;
            height: 28px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .like-btn.liked {
            color: var(--accent-pink);
        }

        .like-btn.liked svg {
            fill: var(--accent-pink);
            stroke: var(--accent-pink);
            filter: drop-shadow(0 0 10px rgba(255, 0, 127, 0.5));
        }

        /* =========================================
           RIGHT: MASSIVE GAME CANVAS
           ========================================= */
        .game-card {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.2);
            /* Sehr dunkles Glas für Fokus */
        }

        .game-card:hover {
            border-color: rgba(255, 255, 255, 0.1);
        }

        /* Ein feines, leichtes Icon in der Mitte als Platzhalter */
        .game-placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            color: rgba(255, 255, 255, 0.1);
        }

        .game-placeholder svg {
            width: 80px;
            height: 80px;
            fill: none;
            stroke: currentColor;
            stroke-width: 1;
        }

        /* --- RESPONSIVE MOBILE --- */
        @media (max-width: 950px) {
            body {
                padding: 20px;
            }

            .core-layout {
                grid-template-columns: 1fr;
                height: auto;
                gap: 20px;
            }

            .game-card {
                height: 70vh;
                order: -1;
                min-height: 500px;
            }

            /* Spiel rutscht auf dem Handy nach ganz oben */
            .video-card {
                min-height: 300px;
            }
        }
    </style>
</head>

<body>

    <div class="ambient-mesh"></div>

    <main class="core-layout">

        <!-- ================= LINKS: DISCOVERY STACK ================= -->
        <aside class="discovery-stack">

            <!-- Profil & Track (Keine unnötigen Labels) -->
            <div class="artist-header">
                <div class="avatar">
                    <svg viewBox="0 0 24 24">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                        <circle cx="12" cy="7" r="4" />
                    </svg>
                </div>
                <div class="artist-info">
                    <div class="artist-name">gino</div>
                    <div class="track-name">we still teens</div>
                </div>
            </div>

            <!-- Video Player (Clean) -->
            <div class="glass-card video-card">
                <div class="play-btn-large">
                    <svg viewBox="0 0 24 24">
                        <polygon points="5 3 19 12 5 21 5 3" />
                    </svg>
                </div>
            </div>

            <!-- Controls (Nur Icons, kein Text) -->
            <div class="glass-card controls-card">
                <button class="icon-btn" title="Previous">
                    <svg viewBox="0 0 24 24">
                        <polygon points="19 20 9 12 19 4 19 20" />
                        <line x1="5" y1="19" x2="5" y2="5" />
                    </svg>
                </button>
                <button class="icon-btn" title="Pause / Play">
                    <svg viewBox="0 0 24 24">
                        <rect x="6" y="4" width="4" height="16" />
                        <rect x="14" y="4" width="4" height="16" />
                    </svg>
                </button>
                <button class="icon-btn" title="Next">
                    <svg viewBox="0 0 24 24">
                        <polygon points="5 4 15 12 5 20 5 4" />
                        <line x1="19" y1="5" x2="19" y2="19" />
                    </svg>
                </button>

                <!-- Spacer -->
                <div style="width: 2px; height: 30px; background: rgba(255,255,255,0.05); margin: 0 10px;"></div>

                <button class="icon-btn like-btn" title="Save Artist" onclick="this.classList.toggle('liked')">
                    <svg viewBox="0 0 24 24">
                        <path
                            d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z" />
                    </svg>
                </button>
            </div>

        </aside>

        <!-- ================= RECHTS: GAME CANVAS ================= -->
        <section class="glass-card game-card">
            <div class="game-placeholder">
                <!-- Ein minimalistisches Controller-Icon als Platzhalter -->
                <svg viewBox="0 0 24 24">
                    <rect x="2" y="6" width="20" height="12" rx="2" ry="2" />
                    <line x1="6" y1="12" x2="10" y2="12" />
                    <line x1="8" y1="10" x2="8" y2="14" />
                    <line x1="15" y1="13" x2="15.01" y2="13" />
                    <line x1="18" y1="11" x2="18.01" y2="11" />
                </svg>
            </div>
        </section>

    </main>

</body>

</html>
