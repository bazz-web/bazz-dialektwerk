  <script>
    // JavaScript für das Handy zum Öffnen/Schließen
    function toggleMobilePanel() {
      const drawer = document.getElementById('mobileDrawer');
      const arrow = document.getElementById('drawerArrow'); // Zielt nur auf den Pfeil

      drawer.classList.toggle('open');

      // Pfeilrichtung ändern
      if (drawer.classList.contains('open')) {
        arrow.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>';
      } else {
        arrow.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>';
      }
    }

    // Wähle den Button aus (hier angenommen, er hat die ID "like-button")
    const likeButton = document.getElementById('like-button');

    // Füge einen Klick-Zuhörer (Event Listener) hinzu
    likeButton.addEventListener('click', function () {
      // 'toggle' fügt die Klasse 'liked' hinzu, wenn sie fehlt, 
      // und entfernt sie, wenn sie bereits da ist.
      this.classList.toggle('liked');
    });

    // Elemente aus dem HTML auswählen
    const openBtn = document.getElementById('open-filter-btn');
    const closeBtn = document.getElementById('close-filter-btn');
    const modal = document.getElementById('filter-modal');

    // Öffnen: Klick auf das Filter-Symbol
    openBtn.addEventListener('click', () => {
      modal.classList.add('active');
    });

    // Schließen: Klick auf das "X"
    closeBtn.addEventListener('click', () => {
      modal.classList.remove('active');
    });

    // Optionaler Bonus: Schließen, wenn man außerhalb der Box auf den dunklen Hintergrund klickt
    modal.addEventListener('click', (event) => {
      if (event.target === modal) {
        modal.classList.remove('active');
      }
    });
  </script>







  <script src="https://cdnjs.cloudflare.com/ajax/libs/color-thief/2.3.0/color-thief.umd.js"></script>
  <script>
    const colorThief = new ColorThief();
    const img = document.getElementById('profile-img');
    const banner = document.getElementById('banner');

    // Sicherstellen, dass das Skript läuft, wenn das Bild geladen ist
    if (img.complete) {
      setBannerColor();
    } else {
      img.addEventListener('load', function () {
        setBannerColor();
      });
    }

    function setBannerColor() {
      // Holt die 5 Farben als [R, G, B] Arrays
      let palette = colorThief.getPalette(img, 5);

      // Sortiert die Farben nach wahrgenommener Helligkeit (Hellste zuerst)
      palette.sort((a, b) => {
        // Formel für die Helligkeit: (R * 0.299) + (G * 0.587) + (B * 0.114)
        const brightnessA = (a[0] * 0.299) + (a[1] * 0.587) + (a[2] * 0.114);
        const brightnessB = (b[0] * 0.299) + (b[1] * 0.587) + (b[2] * 0.114);

        // Sortierung von Groß (Hell) nach Klein (Dunkel)
        return brightnessB - brightnessA;
      });

      // Entpackt die nun sortierten Farben in Variablen
      const [c1, c2, c3, c4, c5] = palette.map(color => `rgb(${color[0]}, ${color[1]}, ${color[2]})`);

      // Baut den vertikalen Verlauf auf (c1 ist jetzt garantiert die hellste, c5 die dunkelste)
      banner.style.background = `linear-gradient(to bottom, 
                ${c1} 0%, 
                ${c2} 10%, 
                ${c3} 30%, 
                ${c4} 50%, 
                ${c5} 70%
            )`;
    }
  </script>
